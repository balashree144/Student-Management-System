<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Student Dashboard</title>

<link rel="stylesheet" href="student_management\students\static\css\student.css">
<style>
*{
    margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
display:flex;
background:#eef2f7;
}

.sidebar{
width:250px;
height:100vh;
background:#0f172a;
padding:30px;
}

.sidebar h2{
color:white;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:15px;
margin-bottom:10px;
text-decoration:none;
color:white;
border-radius:8px;
}

.sidebar a:hover{
background:#0ea5e9;
}

.main{
flex:1;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin:30px 0;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h2{
color:#0ea5e9;
}

.task-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#0ea5e9;
color:white;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid #ddd;
}

button{
padding:10px 18px;
border:none;
background:#0ea5e9;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0284c7;
}
</style>
</head>

<body>

<div class="sidebar">

<h2>Student</h2>

<a href="#">Dashboard</a>

<a href="#">My Tasks</a>

<a href="#">Completed</a>

<a href="#">Profile</a>

<a href="#">Logout</a>

</div>

<div class="main">

<div class="topbar">

<h1>Student Dashboard</h1>

</div>

<div class="cards">

<div class="card">

<h2>8</h2>

<p>Total Tasks</p>

</div>

<div class="card">

<h2>5</h2>

<p>Completed</p>

</div>

<div class="card">

<h2>3</h2>

<p>Pending</p>

</div>

</div>

<div class="task-box">

<h2>Assigned Tasks</h2>

<table>

<tr>

<th>Task</th>

<th>Deadline</th>

<th>Status</th>

<th>Action</th>

</tr>

<tr>

<td>Django CRUD</td>

<td>20 July</td>

<td>Pending</td>

<td><button>Submit</button></td>

</tr>

<tr>

<td>REST API</td>

<td>18 July</td>

<td>Completed</td>

<td><button disabled>Done</button></td>

</tr>

</table>

</div>

</div>

</body>
</html>
