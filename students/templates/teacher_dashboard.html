<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/teacher.css' %}">
</head>
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
display:flex;
background:#f5f7fb;
}

.sidebar{
width:250px;
height:100vh;
background:#1f2937;
padding:30px;
}

.sidebar h2{
color:white;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:15px;
margin-bottom:10px;
text-decoration:none;
color:white;
border-radius:8px;
}

.sidebar a:hover{
background:#2563eb;
}

.main{
flex:1;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:30px;
}

.topbar button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h2{
color:#2563eb;
}

.table-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:15px;
text-align:left;
border-bottom:1px solid #ddd;
}

th{
background:#2563eb;
color:white;
}
</style>
<body>

<div class="sidebar">
    <h2>Teacher</h2>

    <a href="#">Dashboard</a>
    <a href="#">Assign Task</a>
    <a href="#">Students</a>
    <a href="#">Completed Tasks</a>
    <a href="#">Logout</a>
</div>

<div class="main">

    <div class="topbar">
        <h1>Teacher Dashboard</h1>

        <button>Create Task</button>
    </div>

    <div class="cards">

        <div class="card">
            <h2>120</h2>
            <p>Total Students</p>
        </div>

        <div class="card">
            <h2>35</h2>
            <p>Tasks Assigned</p>
        </div>

        <div class="card">
            <h2>20</h2>
            <p>Completed</p>
        </div>

        <div class="card">
            <h2>15</h2>
            <p>Pending</p>
        </div>

    </div>

    <div class="table-box">

        <h2>Recent Tasks</h2>

        <table>

            <tr>
                <th>Task</th>
                <th>Student</th>
                <th>Deadline</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>Django CRUD</td>
                <td>John</td>
                <td>20 July</td>
                <td>Pending</td>
            </tr>

            <tr>
                <td>REST API</td>
                <td>David</td>
                <td>18 July</td>
                <td>Completed</td>
            </tr>

        </table>

    </div>

</div>

</body>
</html>
